# AeroDrag Wheel — Zephyr / nRF Connect SDK config
# Board: XIAO BLE Sense (xiao_ble/nrf52840/sense) — IMU LSM6DS3TR-C onboard + LiPo.

# ── BLE peripheral ───────────────────────────────────────────────────────────
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="AeroDrag Wheel"
CONFIG_BT_MAX_CONN=2
CONFIG_BT_GATT_CLIENT=n
CONFIG_BT_GATT_DYNAMIC_DB=y

# Bonding/cifratura del confine G (contract v0.3.4 §2.G): il link 0xBB00 DEVE essere
# cifrato + bondato (LE SM1, Level >=2). Just Works / NoInputNoOutput (default: nessun
# auth-cb con display/input) -> Level 2 *unauthenticated*, coerente col central ESP32
# (sm_sc=1, sm_mitm=0, NoInputNoOutput, key_dist ENC|ID, indirizzo pubblico statico).
# NON abilitare SC-only (CONFIG_BT_SMP_SC_PAIR_ONLY) o MITM qui: e' il passo 4
# anti-downgrade del rollout (seam #21); unilaterale staccherebbe il pairing.
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_SETTINGS=y
CONFIG_BT_FILTER_ACCEPT_LIST=y
CONFIG_BT_MAX_PAIRED=2

# Battery Service standard (0x180F) — addizione non-breaking, utile lato prodotto.
CONFIG_BT_BAS=y

# ── IMU onboard LSM6DS3TR-C (I2C interno) ───────────────────────────────────
# Il LSM6DS3TR-C è register-compatibile con la famiglia LSM6DSL. Se la tua
# versione di NCS dichiara l'IMU con un altro compatible, adegua qui (vedi README).
CONFIG_SENSOR=y
CONFIG_I2C=y
CONFIG_LSM6DSL=y
CONFIG_LSM6DSL_ENABLE_TEMP=y

# ── ADC + GPIO (lettura batteria LiPo del XIAO) ─────────────────────────────
CONFIG_ADC=y
CONFIG_GPIO=y

# ── Persistenza config + bond (Settings su NVS/flash) ───────────────────────
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y

# ── Floating point + stampa %f nei log ──────────────────────────────────────
CONFIG_FPU=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# ── Stack ────────────────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# ── Logging ──────────────────────────────────────────────────────────────────
CONFIG_LOG=y
